services:
  quarkus-demo-app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    hostname: dev
    environment:
      # NOTE: POSTGRES_DB/USER/PASSWORD should match values in db container
      POSTGRES_PASSWORD: demo
      POSTGRES_USER: demo
      POSTGRES_DB: DemoDB
      POSTGRES_HOST: quarkus-demo-db
      POSTGRES_PORT: 5432
      DB_HOST: quarkus-demo-db
      DB_PORT: 5432
      DB_NAME: DemoDB
      DB_USER: demo
      DB_PASSWORD: demo
      RABBITMQ_HOST: quarkus-demo-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    volumes:
      - ..:/workspaces:cached
      - ~/.ssh:/home/vscode/.ssh
      - ~/.m2:/home/vscode/.m2
    command: sleep infinity
    depends_on:
      quarkus-demo-db:
        condition: service_healthy
      quarkus-demo-rabbitmq:
        condition: service_healthy

  quarkus-demo-db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: DemoDB
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d DemoDB"]
      interval: 5s
      timeout: 5s
      retries: 5

  quarkus-demo-rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  quarkus-gradle-cache:
  postgres-data:
